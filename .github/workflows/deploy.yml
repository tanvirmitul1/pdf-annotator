name: Build & Deploy (Low RAM VPS Safe)

# ──────────────────────────────────────────────────────────────
# WHY: Your 1GB VPS cannot survive `next build`. This workflow
# builds on GitHub's 7GB runner, then ships only the compiled
# standalone output (~50-100MB) to your server.
# ──────────────────────────────────────────────────────────────

on:
  push:
    branches: [master]   # change to 'main' if you rename later

  # Allows manual trigger from GitHub UI (Actions → Run workflow)
  workflow_dispatch:

env:
  NODE_VERSION: "20"
  DEPLOY_PATH: "/var/www/pdf-annotator"
  # Dummy values needed at build time — Prisma requires these during
  # `postinstall` (prisma generate) and Zod env validation runs during
  # Next.js "Collecting page data" phase. Real values are loaded at
  # runtime from .env on your VPS.
  DATABASE_URL: "postgresql://dummy:dummy@localhost:5432/dummy"
  DIRECT_URL: "postgresql://dummy:dummy@localhost:5432/dummy"
  AUTH_SECRET: "build-time-placeholder-not-used-at-runtime-xxxxx"
  NEXTAUTH_SECRET: "build-time-placeholder-not-used-at-runtime-xxxxx"
  NEXTAUTH_URL: "http://localhost:3000"
  GOOGLE_CLIENT_ID: "dummy-google-client-id"
  GOOGLE_CLIENT_SECRET: "dummy-google-client-secret"
  GITHUB_CLIENT_ID: "dummy-github-client-id"
  GITHUB_CLIENT_SECRET: "dummy-github-client-secret"
  EMAIL_FROM: "build@localhost"
  APP_ENV: "production"
  APP_URL: "http://localhost:3000"

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      # ─── 1. Checkout code ───────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ─── 2. Setup Node + pnpm ──────────────────────────────
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"   # caches ~/.pnpm-store between runs

      # ─── 3. Install dependencies ───────────────────────────
      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # ─── 4. Generate Prisma client ─────────────────────────
      # postinstall runs `prisma generate` but let's be explicit
      - name: Generate Prisma client
        run: pnpm db:generate

      # ─── 5. Build (standalone mode) ────────────────────────
      # CI_BUILD=1 triggers `output: "standalone"` in next.config.mjs
      - name: Build Next.js (standalone)
        run: pnpm build
        env:
          CI_BUILD: "1"
          NODE_OPTIONS: "--max-old-space-size=4096"
          # NEXT_PUBLIC_* vars are BAKED INTO client JS at build time.
          # These must be real values — they cannot be overridden at runtime.
          NEXT_PUBLIC_POSTHOG_KEY: ${{ secrets.NEXT_PUBLIC_POSTHOG_KEY }}
          NEXT_PUBLIC_POSTHOG_HOST: "https://app.posthog.com"
          NEXT_PUBLIC_SENTRY_DSN: ${{ secrets.NEXT_PUBLIC_SENTRY_DSN }}

      # ─── 6. Prepare deploy package ─────────────────────────
      # standalone output structure:
      #   .next/standalone/   → full Node.js server (server.js + node_modules)
      #   .next/static/       → client-side assets (JS, CSS)
      #   public/             → static files (favicon, images)
      - name: Prepare deploy package
        run: |
          # Copy standalone output (includes server.js, node_modules, .next/)
          cp -r .next/standalone deploy

          # The standalone .next/ is missing static assets — add them
          cp -r .next/static deploy/.next/static

          # Copy public directory
          cp -r public deploy/public

          # Debug: verify BUILD_ID exists
          echo "BUILD_ID: $(cat deploy/.next/BUILD_ID 2>/dev/null || echo 'MISSING!')"
          ls -la deploy/.next/

          # Copy Prisma schema + migrations for `prisma migrate deploy`
          mkdir -p deploy/prisma
          cp -r prisma/schema.prisma deploy/prisma/
          cp -r prisma/migrations deploy/prisma/migrations

          # Create a deploy-only prisma.config.ts that doesn't depend on
          # dotenv or prisma/config (not available in standalone output).
          # Env vars are loaded via `source .env` in the deploy script.
          printf '%s\n' 'export default {' '  schema: "prisma/schema.prisma",' '  datasource: { url: process.env.DIRECT_URL },' '}' > deploy/prisma.config.ts

      # ─── 7. Upload to VPS via SCP ──────────────────────────
      - name: Upload to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT || 22 }}
          source: "deploy/*"
          target: "${{ env.DEPLOY_PATH }}/incoming"
          strip_components: 1   # removes the "deploy/" prefix

      # ─── 8. Deploy on VPS ──────────────────────────────────
      - name: Deploy and restart
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT || 22 }}
          command_timeout: 5m
          script: |
            set -e
            APP_DIR="${{ env.DEPLOY_PATH }}"
            ENV_FILE="$APP_DIR/.env"

            # Swap old → new atomically
            rm -rf "$APP_DIR/previous"
            if [ -d "$APP_DIR/current" ]; then
              mv "$APP_DIR/current" "$APP_DIR/previous"
            fi
            mv "$APP_DIR/incoming" "$APP_DIR/current"

            cd "$APP_DIR/current"

            # Symlink the shared .env into the current release
            ln -sf "$ENV_FILE" .env

            # Extract DIRECT_URL from .env and write it directly into
            # prisma.config.ts (process.env is unreliable in SSH actions)
            DB_URL=$(grep '^DIRECT_URL=' "$ENV_FILE" | cut -d'=' -f2-)
            printf '%s\n' \
              "export default {" \
              "  schema: \"prisma/schema.prisma\"," \
              "  datasource: { url: \"${DB_URL}\" }," \
              "}" > prisma.config.ts

            # Load all env vars for PM2
            set -a
            source "$ENV_FILE"
            set +a

            # Run database migrations
            npx prisma migrate deploy

            # Always delete and re-create PM2 process to ensure correct cwd
            pm2 delete pdf-annotator 2>/dev/null || true
            pm2 start server.js \
              --name pdf-annotator \
              --cwd "$APP_DIR/current" \
              --node-args="--max-old-space-size=512" \
              -- --hostname 0.0.0.0

            # Update worker code and restart
            WORKER_DIR="$HOME/pdf-annotator"
            if [ -d "$WORKER_DIR" ]; then
              cd "$WORKER_DIR"
              git pull origin master
              pm2 restart pdf-worker 2>/dev/null || true
            fi

            pm2 save

            echo "Deploy complete"
